<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация Kado</title>
    <link rel="stylesheet" href="Styles/fonts.css">
    <link rel="stylesheet" href="Styles/welcome-page/welcome.css">
    <link rel="icon" href="image/Kado.ico"/>
</head>
<body>
    <header class="app-header">
        <a href="main.html" style="color: white; text-decoration: none;"><h1>Kado</h1></a>
            <nav class="nav-menu">
                <ul class="nav-menu__list">
                    <li class="nav-menu__item">
                        <button type="button" class="btn btn-header btn-header--help">
                            <a href="https://t.me/KadoSupport_bot" target="_blank">ПОМОЩЬ</a>
                        </button>
                    </li>
                    <li class="nav-menu__item nav-menu__item--theme">
                        <label class="switch">
                            <input type="checkbox" id="theme-toggle">
                            <span class="slider"></span>
                        </label>
                        <span id="theme-label"></span>
                    </li>
            </nav>
    </header>

    <main class="welcome-page">
        <section class="reg">
            <div class="container">
                <div class="register-box">
                    <form class="registration" id="registration-form" novalidate>
                        <h2>Регистрация</h2>

                        <div class="form-group">
                            <label for="reg-email">Email</label>
                            <input type="email" id="reg-email" name="email" placeholder="kado@email.com" autocomplete="email" required>
                        </div>

                        <div class="form-group">
                            <label for="reg-login">Логин</label>
                            <input type="text" id="reg-login" name="login" placeholder="KadoUser1" autocomplete="username" minlength="3" maxlength="24" required>
                        </div>

                        <div class="form-group">
                            <label for="reg-password">Пароль</label>
                            <input type="password" id="reg-password" name="password" placeholder="passWord" autocomplete="new-password" minlength="8" required>
                        </div>

                        <p class="form-message" id="form-message" role="alert" aria-live="polite"></p>

                        <button type="submit" class="btn-registr" id="btn-register" enabled>Зарегистрироваться</button>

                        <div class="divider">
                            <span>или</span>
                        </div>

                        <button type="button" class="btn-google" id="btn-google">
                            <span class="google-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                            </span>
                            Продолжить через Google
                        </button>

                        <p class="login-link">
                            Уже есть аккаунт?<br>
                            <a href="index1.html">Войти в приложение</a>
                        </p>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="JavaScript/register.js"></script>
</body>
</html>
