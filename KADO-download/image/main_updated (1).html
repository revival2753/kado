<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kado</title>
    <link rel="stylesheet" href="Styles/fonts.css">
    <link rel="stylesheet" href="Styles/main-page/style.css">
    <link rel="icon" href="image/Kado.ico"/>

</head>
<body>
    <div class="container">
        <header class="app-header">
            <a href="main.html" style="color: white; text-decoration: none;"><h1>Kado</h1></a>
            
        </header>

        <input type="checkbox" id="check" class="sidebar-toggle" checked>
        
        

        <aside class="sidebar">
            <section class="words-section">
                <div class="section-title">
                    <h2>Всего: <span id="words-count">0</span></h2>
                    <div class="header-search">
                        <input type="text" id="search-words" placeholder="Поиск слов..." autocomplete="off">
                    </div>
                    <div class="sidebar-tools">
                        <div class="sidebar-tools__col sidebar-tools__col--left">
                            <button type="button" class="btn btn-toolbar" id="shuffle-btn">Перемешать</button>
                            <button type="button" class="btn btn-toolbar" id="import-btn">Импорт</button>
                        </div>
                        <div class="sidebar-tools__col sidebar-tools__col--right">
                            <button type="button" class="btn btn-toolbar" id="export-btn">Экспорт</button>
                            <button type="button" class="btn btn-toolbar btn-toolbar--clear" id="clear-all-btn">Очистить</button>
                        </div>
                    </div>
                </div>

                <div class="words-list" id="words-list">
                    <div class="empty-message">Список слов пуст. Добавьте первую карточку!</div>
                </div>
            </section>
        </aside>

        <main class="main-content">
            <section class="card-section">
                <div class="card-controls card-controls--hidden">
                    <button type="button" class="btn btn-nav" id="prev-btn">← Назад</button>
                    <button type="button" class="btn btn-show" id="show-btn">Перевод</button>
                    <button type="button" class="btn btn-nav" id="next-btn">Вперед →</button>
                </div>

                <div class="card" id="flashcard">
                    <div class="card-inner">
                        <div class="card-front">
                            <span id="front-text">Добавьте первую карточку!</span>
                        </div>
                        <div class="card-back">
                            <span id="back-text">Нажмите «Перевод»</span>
                        </div>
                    </div>
                </div>

                <div class="edit-times">
                    <div class="btn-times">
                        <button type="button" class="btn btn-rating btn-rating--repeat" id="repeat-btn">Повторить</button>
                        <button type="button" class="btn btn-rating btn-rating--hard" id="hard-btn">Сложно</button>
                        <button type="button" class="btn btn-rating btn-rating--normal" id="normal-btn">Нормально</button>
                        <button type="button" class="btn btn-rating btn-rating--easy" id="easy-btn">Легко</button>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="total-cards">0</div>
                        <div class="stat-label">Всего карточек</div>
                    </div>
                    <div class="stat-item stat-item--hidden">
                        <div class="stat-value" id="current-card"></div>
                        <div class="stat-label"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="mastered-cards">0</div>
                        <div class="stat-label">Выучено слов</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal" id="add-card-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Добавить новую карточку</h3>
                <button type="button" class="modal-close" id="close-add-modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <input type="text" id="modal-russian-word" class="modal-input" maxlength="35" placeholder="Слово на английском">
                    <input type="text" id="modal-english-word" class="modal-input" maxlength="35" placeholder="Слово на русском">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="modal-add-btn">Добавить</button>
                <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Отмена</button>
            </div>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Редактировать слово</h3>
                <button type="button" class="modal-close" id="close-edit-modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <input type="text" id="edit-russian" class="modal-input" placeholder="Слово на английском">
                    <input type="text" id="edit-english" class="modal-input" placeholder="Слово на русском">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="save-edit-btn">Сохранить</button>
                <button type="button" class="btn btn-secondary" id="cancel-edit-btn">Отмена</button>
            </div>
        </div>
    </div>

    <div class="modal" id="clear-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Очистить все слова?</h3>
                <button type="button" class="modal-close" id="close-clear-modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <p class="modal-text">Вы уверены, что хотите удалить все слова? Это действие нельзя отменить.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" id="confirm-clear">Очистить всё</button>
                <button type="button" class="btn btn-secondary" id="cancel-clear">Отмена</button>
            </div>
        </div>
    </div>

    <input type="file" id="import-file" accept=".csv" hidden>

    <script src="JavaScript/javascript.js"></script>

<div class="bottom-nav">
    <button class="bottom-btn bottom-btn--left" id="sidebar-open-btn" aria-label="Открыть меню">
        ☰
    </button>

    <button class="bottom-btn bottom-btn--center" id="open-add-modal-bottom" aria-label="Добавить">
        +
    </button>

    <a class="bottom-btn bottom-btn--right" href="https://t.me/KadoSupport_bot" target="_blank" aria-label="Помощь">
        ⚙
    </a>
</div>
<script>
document.getElementById('sidebar-open-btn').addEventListener('click', function () {
    document.getElementById('check').checked = true;
});
document.getElementById('open-add-modal-bottom').addEventListener('click', function () {
    document.getElementById('open-add-modal').click();
});
</script>

</body>
</html>
